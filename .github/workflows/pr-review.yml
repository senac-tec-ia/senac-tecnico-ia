name: PR Review & Checks

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review Automático
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff against base

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      # ── 1. Review script (categorização + alertas) ──
      - name: Run review
        run: |
          node scripts/review-staged.mjs --ci --base=origin/${{ github.base_ref }} --markdown > /tmp/review.md 2>&1 || true

      # ── 2. Validate HA (contextos vs AULAS-DADAS.md) ──
      - name: Validate HA
        run: |
          node scripts/validate-ha.mjs > /tmp/validate-ha.txt 2>&1 || true

      # ── 3. Lint slides alterados ──
      - name: Lint changed slides
        run: |
          CHANGED_SLIDES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*/slides.md')
          if [ -z "$CHANGED_SLIDES" ]; then
            echo "Nenhum slides.md alterado neste PR." > /tmp/lint-slides.txt
          else
            > /tmp/lint-slides.txt
            for f in $CHANGED_SLIDES; do
              if [ -f "$f" ]; then
                node scripts/lint-slides.mjs "$f" >> /tmp/lint-slides.txt 2>&1 || true
                echo "" >> /tmp/lint-slides.txt
              fi
            done
          fi

      # ── 4. Post comment on PR ──
      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const ha = fs.readFileSync('/tmp/validate-ha.txt', 'utf8');
            const lint = fs.readFileSync('/tmp/lint-slides.txt', 'utf8');

            const body = [
              review,
              '',
              '<details><summary>📊 Validação de HA</summary>',
              '',
              '```',
              ha,
              '```',
              '',
              '</details>',
              '',
              '<details><summary>🔍 Lint de Slides</summary>',
              '',
              '```',
              lint,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Find existing bot comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 📋 Review Automático';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
