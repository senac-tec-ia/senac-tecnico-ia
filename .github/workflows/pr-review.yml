name: PR Review & Checks

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review Automático
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff against base

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      # ── 1. Review script (categorização + alertas) ──
      - name: Run review
        id: review
        run: |
          REVIEW=$(node scripts/review-staged.mjs --ci --base=origin/${{ github.base_ref }} --markdown 2>&1) || true
          echo "review<<REVIEW_EOF" >> "$GITHUB_OUTPUT"
          echo "$REVIEW" >> "$GITHUB_OUTPUT"
          echo "REVIEW_EOF" >> "$GITHUB_OUTPUT"

      # ── 2. Validate HA (contextos vs AULAS-DADAS.md) ──
      - name: Validate HA
        id: validate_ha
        run: |
          OUTPUT=$(node scripts/validate-ha.mjs 2>&1) || true
          echo "ha<<HA_EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "HA_EOF" >> "$GITHUB_OUTPUT"

      # ── 3. Lint slides alterados ──
      - name: Lint changed slides
        id: lint_slides
        run: |
          CHANGED_SLIDES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*/slides.md')
          if [ -z "$CHANGED_SLIDES" ]; then
            echo "lint=Nenhum slides.md alterado neste PR." >> "$GITHUB_OUTPUT"
          else
            OUTPUT=""
            for f in $CHANGED_SLIDES; do
              if [ -f "$f" ]; then
                RESULT=$(node scripts/lint-slides.mjs "$f" 2>&1) || true
                OUTPUT="${OUTPUT}${RESULT}\n\n"
              fi
            done
            echo "lint<<LINT_EOF" >> "$GITHUB_OUTPUT"
            echo -e "$OUTPUT" >> "$GITHUB_OUTPUT"
            echo "LINT_EOF" >> "$GITHUB_OUTPUT"
          fi

      # ── 4. Post comment on PR ──
      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            const ha = `${{ steps.validate_ha.outputs.ha }}`;
            const lint = `${{ steps.lint_slides.outputs.lint }}`;

            const body = [
              review,
              '',
              '<details><summary>📊 Validação de HA</summary>',
              '',
              '```',
              ha,
              '```',
              '',
              '</details>',
              '',
              '<details><summary>🔍 Lint de Slides</summary>',
              '',
              '```',
              lint,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Find existing bot comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 📋 Review Automático';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
