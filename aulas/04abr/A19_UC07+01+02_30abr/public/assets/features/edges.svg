<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="1" stop-color="#020409"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- faint grid -->
  <g opacity="0.22" stroke="#233" stroke-width="1">
    <path d="M0 75H800M0 150H800M0 225H800M0 300H800M0 375H800"/>
    <path d="M100 0V450M200 0V450M300 0V450M400 0V450M500 0V450M600 0V450M700 0V450"/>
  </g>

  <!-- contours / edges -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M120 310 C170 230, 210 200, 280 190 C360 178, 410 145, 460 120" stroke-width="6" opacity="0.9"/>
    <path d="M470 120 C515 96, 560 94, 610 120 C650 142, 685 175, 700 215" stroke-width="6" opacity="0.9"/>
    <path d="M700 215 C715 255, 700 285, 660 300 C620 315, 560 318, 520 308" stroke-width="6" opacity="0.9"/>
    <path d="M520 308 C470 295, 410 300, 360 320" stroke-width="6" opacity="0.9"/>

    <path d="M265 210 C245 230, 240 260, 255 285" stroke-width="5" opacity="0.75"/>
    <path d="M355 205 C370 235, 370 270, 350 295" stroke-width="5" opacity="0.75"/>

    <path d="M310 255 C330 248, 350 248, 370 255" stroke-width="4" opacity="0.65"/>

    <!-- little texture edges -->
    <path d="M150 340 l18 -10" stroke-width="3" opacity="0.45"/>
    <path d="M190 350 l18 -10" stroke-width="3" opacity="0.45"/>
    <path d="M230 360 l18 -10" stroke-width="3" opacity="0.45"/>
    <path d="M610 320 l-18 -10" stroke-width="3" opacity="0.45"/>
    <path d="M650 330 l-18 -10" stroke-width="3" opacity="0.45"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" fill="#dbeafe" opacity="0.9">
    <text x="24" y="48" font-size="26">BORDAS / CONTORNOS</text>
    <text x="24" y="80" font-size="16" opacity="0.75">detecção de mudanças fortes (contraste)</text>
  </g>
</svg>
