<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="1" stop-color="#020409"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <g opacity="0.25" stroke="#233" stroke-width="1">
    <path d="M0 75H800M0 150H800M0 225H800M0 300H800M0 375H800"/>
    <path d="M100 0V450M200 0V450M300 0V450M400 0V450M500 0V450M600 0V450M700 0V450"/>
  </g>

  <!-- corners / junctions -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M160 320 H260 V220" stroke-width="10" opacity="0.9"/>
    <path d="M320 120 V220 H420" stroke-width="10" opacity="0.85"/>
    <path d="M560 140 H660 V240" stroke-width="10" opacity="0.85"/>
    <path d="M540 330 V260 H610" stroke-width="10" opacity="0.85"/>

    <circle cx="260" cy="220" r="10" fill="#ffffff" opacity="0.95"/>
    <circle cx="320" cy="220" r="10" fill="#ffffff" opacity="0.95"/>
    <circle cx="660" cy="240" r="10" fill="#ffffff" opacity="0.95"/>
    <circle cx="540" cy="260" r="10" fill="#ffffff" opacity="0.95"/>

    <!-- small keypoints -->
    <circle cx="210" cy="275" r="6" fill="#ffffff" opacity="0.55"/>
    <circle cx="375" cy="165" r="6" fill="#ffffff" opacity="0.55"/>
    <circle cx="605" cy="185" r="6" fill="#ffffff" opacity="0.55"/>
    <circle cx="575" cy="305" r="6" fill="#ffffff" opacity="0.55"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" fill="#dbeafe" opacity="0.9">
    <text x="24" y="48" font-size="26">CANTOS / JUNÇÕES</text>
    <text x="24" y="80" font-size="16" opacity="0.75">pontos onde as bordas se encontram</text>
  </g>
</svg>
