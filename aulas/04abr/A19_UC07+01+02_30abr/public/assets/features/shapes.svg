<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="1" stop-color="#020409"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <g filter="url(#soft)" opacity="0.95">
    <circle cx="190" cy="250" r="90" fill="#ffffff"/>
    <rect x="340" y="160" width="190" height="190" rx="26" fill="#ffffff"/>
    <path d="M640 350 L560 170 L720 170 Z" fill="#ffffff"/>
  </g>

  <g opacity="0.25" stroke="#233" stroke-width="1">
    <path d="M0 75H800M0 150H800M0 225H800M0 300H800M0 375H800"/>
    <path d="M100 0V450M200 0V450M300 0V450M400 0V450M500 0V450M600 0V450M700 0V450"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" fill="#dbeafe" opacity="0.9">
    <text x="24" y="48" font-size="26">FORMAS</text>
    <text x="24" y="80" font-size="16" opacity="0.75">círculos, quadrados, triângulos… (padrões maiores)</text>
  </g>
</svg>
