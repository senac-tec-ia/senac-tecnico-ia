<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="1" stop-color="#020409"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- simplified "dog face parts" -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- ears -->
    <path d="M240 150 C210 120, 170 120, 160 160 C150 200, 190 220, 225 210" stroke-width="10" opacity="0.9"/>
    <path d="M560 150 C590 120, 630 120, 640 160 C650 200, 610 220, 575 210" stroke-width="10" opacity="0.9"/>

    <!-- eyes -->
    <ellipse cx="310" cy="225" rx="36" ry="28" stroke-width="9" opacity="0.9"/>
    <ellipse cx="490" cy="225" rx="36" ry="28" stroke-width="9" opacity="0.9"/>
    <circle cx="310" cy="230" r="10" fill="#ffffff" opacity="0.95"/>
    <circle cx="490" cy="230" r="10" fill="#ffffff" opacity="0.95"/>

    <!-- nose/mouth -->
    <path d="M400 275 C385 285, 380 300, 400 312 C420 300, 415 285, 400 275 Z" stroke-width="9" opacity="0.95"/>
    <path d="M400 312 C380 330, 360 338, 330 338" stroke-width="8" opacity="0.75"/>
    <path d="M400 312 C420 330, 440 338, 470 338" stroke-width="8" opacity="0.75"/>

    <!-- outline hint -->
    <path d="M260 330 C300 370, 500 370, 540 330" stroke-width="8" opacity="0.45"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" fill="#dbeafe" opacity="0.9">
    <text x="24" y="48" font-size="26">CARACTERÍSTICAS (PARTES)</text>
    <text x="24" y="80" font-size="16" opacity="0.75">olhos, focinho, orelhas… combinações de formas</text>
  </g>
</svg>
